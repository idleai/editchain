[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # `instant` is unmaintained but only a transitive dep via `tantivy`; no direct use.
    "RUSTSEC-2024-0384",
    # `paste` is unmaintained but only a transitive dep via `ratatui`; no direct use.
    "RUSTSEC-2024-0436",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "warn"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []